name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check all Python sources
        run: python -m compileall -q .
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select E9,F63,F7,F82 --output-format=github
